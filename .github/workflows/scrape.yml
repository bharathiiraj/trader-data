name: Scrape House PTR Disclosures

on:
  repository_dispatch:
    types: [scrape]
  schedule:
    # Every 2 hours during market hours Mon-Fri (13:00-21:00 UTC = 9 AM-5 PM ET)
    - cron: '0 13,15,17,19,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Scrape House PTR disclosures
        run: python scrape.py

      - name: Commit and push trades.json
        run: |
          git config user.email "scraper@github-actions"
          git config user.name  "House PTR Scraper"
          git add trades.json
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "Update trades.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          )
