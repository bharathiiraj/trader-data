name: Scrape Capitol Trades

on:
  repository_dispatch:
    types: [scrape]
  schedule:
    - cron: '10,40 13,14,15,16,17,18,19,20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - name: Scrape Capitol Trades
        run: python scrape.py

      - name: Commit and push trades.json
        run: |
          git config user.email "scraper@github-actions"
          git config user.name  "Capitol Trades Scraper"
          git add trades.json
          git diff --cached --quiet && echo "No changes" || (
            git commit -m "Update trades.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          )
