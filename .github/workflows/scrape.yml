name: Scrape House PTR Disclosures

on:
  schedule:
    # Once daily at 8:00 AM ET (12:00 UTC) Mon-Fri
    # House PTR filings arrive ~1-3 per day — no need to run more often
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Scrape House PTR disclosures
        run: python scrape.py

      - name: Commit and push trades.json
        run: |
          git config user.email "scraper@github-actions"
          git config user.name  "House PTR Scraper"
          git add trades.json
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "Update trades.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          )
